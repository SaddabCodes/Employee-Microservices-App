spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: EMPLOYEE
          uri: lb://EMPLOYEE
          predicates:
            - Path=/employee/**
          filters:
            - AuthFilter

        - id: ADDRESS
          uri: lb://ADDRESS
          predicates:
            - Path=/addresses/**
          filters:
            - AuthFilter

        - id: AUTH
          uri: http://localhost:8083
          predicates:
            - Path=/auth/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

server:
  port: 9090